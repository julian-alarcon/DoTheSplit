name: ci
run-name: ci · ${{ github.event.pull_request.title || github.ref_name }}

on:
  pull_request:
  push:
    branches-ignore: [main]
    tags-ignore: ['v*']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-go:
    name: lint / go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: api
          args: --timeout=5m

  test-go:
    name: test / go (race)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: pre-pull postgres image
        # Surfaces registry-pull failures as a clear step-level error
        # instead of as a confusing testcontainers wait timeout deep inside
        # a test run.
        run: docker pull postgres:16-alpine

      - name: go test (race)
        working-directory: api
        run: go test ./... -race -coverprofile=coverage.out

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: api/coverage.out
          if-no-files-found: ignore

  build-web:
    name: build / web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        run: npm ci

      - name: generate api types
        working-directory: web
        run: npx openapi-typescript ../docs/openapi.yaml -o src/lib/api/schema.d.ts

      - name: astro check
        working-directory: web
        run: npm run check

      - name: build
        working-directory: web
        run: npm run build

  verify-openapi:
    name: verify / openapi codegen
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: install web deps (needed for openapi-typescript)
        working-directory: web
        run: npm ci

      - name: regenerate bindings
        run: make gen

      - name: fail if generated files changed
        run: |
          if ! git diff --exit-code -- api/internal/apigen web/src/lib/api/schema.d.ts; then
            echo "::error::Generated API bindings are out of date. Run 'make gen' and commit."
            exit 1
          fi

  build-docker:
    name: build / docker (${{ matrix.image }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./api
            dockerfile: ./api/Dockerfile
          - image: web
            context: .
            dockerfile: ./web/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: dothesplit-${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_VERSION=0.0.0-dev+${{ github.sha }}
