name: ci
run-name: ci · ${{ github.event.pull_request.title || github.ref_name }}

on:
  pull_request:
  push:
    branches-ignore: [main]
    tags-ignore: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-go:
    name: lint / go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: api
          args: --timeout=5m

  test-go:
    name: test / go (race)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: pre-pull postgres image
        # Surfaces registry-pull failures as a clear step-level error
        # instead of as a confusing testcontainers wait timeout deep inside
        # a test run.
        run: docker pull postgres:16-alpine

      - name: go test (race)
        working-directory: api
        run: go test ./... -race -coverprofile=coverage.out

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: api/coverage.out
          if-no-files-found: ignore

  build-app:
    name: build / app (vue spa)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: app/.nvmrc
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: install
        working-directory: app
        run: npm ci

      - name: generate api types
        working-directory: app
        run: npx openapi-typescript ../docs/openapi.yaml -o src/lib/api/schema.d.ts

      - name: type check
        working-directory: app
        run: npm run check

      - name: vitest
        working-directory: app
        run: npm test

      - name: build
        working-directory: app
        run: npm run build

  verify-openapi:
    name: verify / openapi codegen
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: app/.nvmrc
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: install app deps (needed for openapi-typescript)
        working-directory: app
        run: npm ci

      - name: regenerate bindings
        run: make gen

      - name: fail if generated files changed
        run: |
          if ! git diff --exit-code -- api/internal/apigen app/src/lib/api/schema.d.ts; then
            echo "::error::Generated API bindings are out of date. Run 'make gen' and commit."
            exit 1
          fi

  e2e:
    name: e2e / playwright
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: app/.nvmrc
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: install app deps
        working-directory: app
        run: npm ci

      - name: install playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: generate stack secrets
        # Throw-away keys: the docker compose stack is destroyed after this
        # job, so the secrets never leave the runner. The api refuses to
        # boot without all four, so we always generate fresh ones.
        run: |
          {
            echo "EMAIL_ENC_KEY=$(openssl rand -base64 32)"
            echo "EMAIL_HMAC_KEY=$(openssl rand -base64 32)"
            echo "PASSWORD_PEPPER=$(openssl rand -base64 32)"
            echo "JWT_SIGNING_KEY=$(openssl rand -base64 32)"
            # base64url alphabet (`-` and `_` instead of `+` and `/`) so the
            # password is safe to drop into DATABASE_URL userinfo without
            # percent-encoding. Plain base64 contains `/` ~64% of the time,
            # which breaks URL parsing of the userinfo:host:port boundary.
            echo "POSTGRES_PASSWORD=$(openssl rand -base64 24 | tr '+/' '-_')"
          } >> .env
          # Patch DATABASE_URL with the random password so the migrate +
          # api containers can both connect.
          PWD=$(grep ^POSTGRES_PASSWORD= .env | cut -d= -f2-)
          {
            echo "POSTGRES_USER=dts"
            echo "POSTGRES_DB=dts"
            echo "DATABASE_URL=postgres://dts:${PWD}@postgres:5432/dts?sslmode=disable"
            echo "API_HTTP_ADDR=:8080"
            echo "WEB_ORIGIN=http://localhost:8080"
            echo "LOG_LEVEL=info"
            echo "COOKIE_SECURE=false"
            echo "SESSION_COOKIE_DOMAIN="
          } >> .env

      - name: boot stack
        run: docker compose up -d --build

      - name: wait for health
        # The api serves both /healthz and the embedded SPA on :8080. Poll
        # until ready, fail fast if anything regresses.
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null \
               && curl -fsS http://localhost:8080/ >/dev/null; then
              echo "stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "stack failed to become ready in 120s"
          docker compose logs --tail=200
          exit 1

      - name: extract setup token
        # The api logs the install token once at startup as a slog JSON
        # record: {"msg":"first-run setup required","token":"...",...}.
        # Pluck the value out so the Playwright test can drive /setup
        # without a side channel.
        id: token
        run: |
          tok=$(docker compose logs api 2>&1 \
                | grep -o '"token":"[A-Za-z0-9_-]*"' \
                | head -1 \
                | sed -E 's/"token":"([^"]+)"/\1/')
          if [ -z "$tok" ]; then
            echo "::error::could not extract setup token from api logs"
            docker compose logs api --tail=100
            exit 1
          fi
          echo "token=$tok" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$tok"

      - name: run playwright
        working-directory: app
        env:
          APP_BASE_URL: http://localhost:8080
          SETUP_TOKEN: ${{ steps.token.outputs.token }}
        run: npm run test:e2e

      - name: capture container logs on failure
        if: failure()
        run: docker compose logs --tail=500

      - name: upload playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: app/playwright-report/
          if-no-files-found: ignore

      - name: tear down
        if: always()
        run: docker compose down -v

  build-docker:
    name: build / docker (${{ matrix.image }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            dockerfile: ./api/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: dothesplit-${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_VERSION=0.0.0-dev+${{ github.sha }}
