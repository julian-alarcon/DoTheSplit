services:
  postgres:
    image: postgres:18.3-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dts}
      POSTGRES_DB: ${POSTGRES_DB:-dts}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql so data goes
      # into a major-version-specific subdir (e.g. /var/lib/postgresql/18/docker).
      # This is what allows future pg_upgrade --link to work in place.
      - dts_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dts} -d ${POSTGRES_DB:-dts}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not exposed to the host in the LAN profile; the API talks over the
    # internal network. Uncomment to connect a local tool during dev.
    # ports: ["5432:5432"]

  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations:ro
    entrypoint: ["migrate"]
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER:-dts}:${POSTGRES_PASSWORD:-dts}@postgres:5432/${POSTGRES_DB:-dts}?sslmode=disable",
        "up",
      ]
    restart: "no"

  api:
    build:
      context: ./api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dts}:${POSTGRES_PASSWORD:-dts}@postgres:5432/${POSTGRES_DB:-dts}?sslmode=disable
      API_HTTP_ADDR: ":8080"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      EMAIL_ENC_KEY: ${EMAIL_ENC_KEY}
      EMAIL_HMAC_KEY: ${EMAIL_HMAC_KEY}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: ./api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    entrypoint: ["/worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dts}:${POSTGRES_PASSWORD:-dts}@postgres:5432/${POSTGRES_DB:-dts}?sslmode=disable
      EMAIL_ENC_KEY: ${EMAIL_ENC_KEY}
      EMAIL_HMAC_KEY: ${EMAIL_HMAC_KEY}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Baked into the image so the footer can show which revision is live.
        # Use `make up` or export BUILD_COMMIT=$(git rev-parse --short HEAD) to populate.
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
    depends_on:
      - api
    environment:
      API_BASE_URL_INTERNAL: http://api:8080
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
      HOST: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  dts_pg_data:
