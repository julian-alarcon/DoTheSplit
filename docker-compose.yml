# Default deployment: single-container SQLite.
#
#   docker compose up -d --build
#
# One dothesplit container, one DB file on a named volume. No postgres, no
# migrate one-shot (migrations run in-process on first boot), and no separate
# worker (the recurring/outbox tick runs as a goroutine inside the app process).
#
# For the PostgreSQL (multi-instance / scale-out) stack instead, use:
#   docker compose -f docker-compose.postgres.yml up -d --build
services:
  dothesplit:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    environment:
      DATABASE_DRIVER: sqlite
      # File DSN on the mounted volume. Pragmas are appended by the app.
      DATABASE_URL: ${DATABASE_URL:-file:/data/dts.db}
      API_HTTP_ADDR: ":8080"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      CAPACITOR_ORIGINS: ${CAPACITOR_ORIGINS:-capacitor://localhost,https://localhost}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      EMAIL_ENC_KEY: ${EMAIL_ENC_KEY:?EMAIL_ENC_KEY must be set in .env}
      EMAIL_HMAC_KEY: ${EMAIL_HMAC_KEY:?EMAIL_HMAC_KEY must be set in .env}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER must be set in .env}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dothesplit", "--healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    # Not read_only: the app writes the SQLite DB + WAL files under /data.
    volumes:
      - dts_sqlite_data:/data
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m

volumes:
  dts_sqlite_data:
