openapi: 3.0.3
info:
  title: DoTheSplit API
  version: 0.2.0
  description: |
    Split expenses among group members.


    Expense-sharing API for the DoTheSplit app.

    Conventions:
      * All money values are integer cents (no floats).
      * All IDs are UUIDs.
      * Authentication is a JWT bearer access token obtained from `/v1/auth/token`
        and refreshed via `/v1/auth/refresh` (rotating `dts_refresh` httpOnly cookie).
        Sent as `Authorization: Bearer <token>`.
      * Request bodies reject unknown fields (`additionalProperties: false`).
      * Times are RFC 3339 UTC.

    Versioning:
      * Business endpoints live under `/v1`. Breaking changes → `/v2`.
      * `/healthz` and `/readyz` are infrastructure endpoints and are NOT versioned.
  contact:
    name: DoTheSplit
    url: https://github.com/julian-alarcon/dothesplit
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

externalDocs:
  description: Product scope and architecture
  url: https://github.com/julian-alarcon/dothesplit/blob/main/BLUEPRINT.md

servers:
  - url: http://localhost:8080
    description: Local dev (Docker Compose)

tags:
  - name: auth
    description: Registration, token issuance/refresh, current-user lookup.
  - name: groups
    description: Groups and membership. The creator is auto-added; any member can add others.
  - name: expenses
    description: Expenses with arbitrary split modes (equal, exact, percent, shares). Soft-deleted. Edits tracked in `expense_revisions`.
  - name: categories
    description: Seeded expense categories (emoji + slug). Read-only in v1.
  - name: balances
    description: Computed net balances and simplified pairwise debts. Never stored.
  - name: settlements
    description: "`X paid Y` records that offset balances."
  - name: recurring
    description: Templates materialized into real expenses by the background worker.
  - name: transactions
    description: Merged, paginated feed of expenses and settlements for a group, newest first.
  - name: activity
    description: Append-only feed of group actions (expense/settlement created, updated, deleted), newest first.
  - name: search
    description: Cross-group full-text search over expense descriptions/notes and settlement notes (member-only rows).
  - name: imports
    description: Bulk-import flows. Hydrate a brand-new group from a Splitwise or DoTheSplit CSV (2..32 members), or append expenses to an existing group from a DoTheSplit-shaped CSV.
  - name: health
    description: Liveness and readiness probes (unversioned).
  - name: admin
    description: Instance-wide administration. Requires role=admin; destructive verbs require a step-up password in the request body.
  - name: setup
    description: First-run install ceremony. Active only while no admin exists.

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Liveness
      operationId: healthz
      security: []
      tags: [health]
      responses:
        "200":
          description: OK

  /readyz:
    get:
      summary: Readiness (pings DB)
      operationId: readyz
      security: []
      tags: [health]
      responses:
        "200":
          description: OK
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /v1/setup/status:
    get:
      summary: Returns whether first-run setup has been completed.
      operationId: getSetupStatus
      tags: [setup]
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }

  /v1/setup/admin:
    post:
      summary: Complete first-run setup by creating the admin account.
      description: |
        Validates the setup token (logged to API stdout on every boot while
        the install ceremony is pending) and creates the very first user
        with role=admin. Idempotent: subsequent calls after success return
        410 Gone regardless of token.
      operationId: completeSetup
      tags: [setup]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupCompleteRequest" }
      responses:
        "201":
          description: Admin created. The caller then logs in via /v1/auth/token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid setup token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410":
          description: Setup already completed; the install ceremony is closed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/register:
    post:
      summary: Register a new user
      description: |
        When SMTP is configured the new account starts unverified: the response
        body's `verification_required` is `true` and a 6-digit verification code
        is emailed to the address. The user must POST it to `/v1/auth/verify`
        before they can log in. When SMTP is not configured the account is
        auto-verified immediately and the user can log in via `/v1/auth/token`.
      operationId: register
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/SetupRequired" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/verify:
    post:
      summary: Verify a pending registration with the 6-digit code
      operationId: verifyEmail
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyEmailRequest" }
      responses:
        "200":
          description: Verified. The user can now log in via /v1/auth/token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/verify/resend:
    post:
      summary: Resend the registration verification code
      description: |
        Always returns 204 regardless of whether the email matches a pending
        registration, to avoid account enumeration. Rate-limited per IP.
      operationId: resendVerification
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResendVerificationRequest" }
      responses:
        "204":
          description: Accepted. A new code may have been sent.
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/password-reset/request:
    post:
      summary: Begin a password reset (sends a 6-digit code by email)
      description: |
        Always responds 204 to avoid account enumeration: the same response
        shape is returned whether the email is registered or not. When the
        email matches an active user a code is enqueued; otherwise nothing
        happens. Rate-limited per IP.
      operationId: requestPasswordReset
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "204":
          description: Accepted. A code may have been emailed.
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/password-reset/confirm:
    post:
      summary: Complete a password reset using the 6-digit code
      operationId: confirmPasswordReset
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetConfirm" }
      responses:
        "200":
          description: Password rotated. The user can now log in via /v1/auth/token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/token:
    post:
      summary: Exchange credentials for a bearer access token
      description: |
        Token-based login for SPA / native (Capacitor) clients. Returns a
        short-lived JWT access token in the body and sets a long-lived,
        rotating refresh token in an httpOnly cookie
        (`dts_refresh`, scoped to `/v1/auth/refresh`). Native clients that have
        no cookie jar receive the refresh token in the body as well.
      operationId: issueToken
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
            example:
              email: ada@example.com
              password: correct-horse-battery
      responses:
        "200":
          description: Access token issued; refresh token set as httpOnly cookie
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Account exists but the email address has not been verified yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/auth/refresh:
    post:
      summary: Rotate the refresh token and mint a new access token
      description: |
        Reads the refresh token from the `dts_refresh` httpOnly cookie (web) or
        the request body (native), rotates it (the presented token is revoked
        and replaced), and returns a fresh access token plus a new refresh
        token. Presenting an already-rotated or revoked refresh token revokes
        the entire token chain for that user and returns 401 (reuse detection).
      operationId: refreshToken
      security: []
      tags: [auth]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New access token issued; refresh cookie rotated
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/token/revoke:
    post:
      summary: Revoke the caller's refresh token (token-client logout)
      description: |
        Revokes the refresh token presented in the `dts_refresh` cookie or the
        request body and clears the cookie. Idempotent: an absent or unknown
        token still returns 204.
      operationId: revokeToken
      security: []
      tags: [auth]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "204":
          description: Refresh token revoked

  /v1/me:
    get:
      summary: Get the current user
      operationId: me
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: Rename the current user
      operationId: updateMe
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      summary: Soft-delete the current user (tombstones display_name, scrubs email, revokes refresh tokens)
      operationId: deleteMe
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Account deleted; refresh cookie cleared
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "423":
          description: Step-up rate-limited; retry after the cooldown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/me/password:
    post:
      summary: Change the current user's password (requires old password)
      description: |
        Changes the password and revokes every other token chain for the user.
        Returns a fresh access token + rotated refresh cookie so the current
        browser stays logged in.
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
      responses:
        "200":
          description: Password changed; new access token issued, refresh cookie rotated
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/email/change-request:
    post:
      summary: Begin a change-email flow (sends a code to the new address)
      description: |
        Step-up: the caller's current password must be supplied. The new email
        is held in a verification token and only persisted to `users.email`
        when the user POSTs the matching 6-digit code to
        `/v1/me/email/change-confirm`. The current address keeps working until
        confirm succeeds.
      operationId: changeEmailRequest
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangeEmailRequest" }
      responses:
        "202":
          description: Code sent (if SMTP is configured); awaiting confirmation.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/me/email/change-confirm:
    post:
      summary: Confirm a pending email change with the 6-digit code
      description: |
        On success the user's email is updated, the user's other token chains
        are revoked, and the refresh cookie is rotated so the current browser
        stays logged in.
      operationId: changeEmailConfirm
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmEmailChangeRequest" }
      responses:
        "200":
          description: Email updated; refresh cookie rotated.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410":
          description: Verification code expired or already used.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /v1/me/notifications:
    get:
      summary: Get the current user's notification preferences
      operationId: getMyNotifications
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: Update the current user's notification preferences
      operationId: updateMyNotifications
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationPrefs" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/avatar:
    put:
      summary: Upload an 8x8 avatar PNG (base64-encoded, <= 1024 bytes)
      operationId: setAvatar
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetAvatarRequest" }
      responses:
        "204":
          description: Avatar saved
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      summary: Remove the current user's avatar (falls back to initials on display)
      operationId: deleteAvatar
      tags: [auth]
      responses:
        "204":
          description: Avatar cleared
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/{id}/avatar:
    get:
      summary: Serve a user's pixelated avatar PNG (group-member access)
      description: |
        Returns the stored avatar PNG for the user. The source is an 8x8 bitmap
        uploaded by the client; the server upscales it with nearest-neighbour
        sampling before storage so it renders crisp at any CSS size. Callers
        must share at least one group with the target user. Browsers should
        cache on `?v={avatar_updated_at}` to avoid stale renders when the owner
        updates.
      operationId: getUserAvatar
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: v
          in: query
          required: false
          schema: { type: string }
          description: |
            Cache-busting version token; pass the user's `avatar_updated_at`.
            The server ignores it, but a changed value gives the browser a
            distinct URL so an updated avatar isn't served stale from cache.
      responses:
        "200":
          description: PNG bytes
          content:
            image/png:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups:
    get:
      summary: List groups the current user belongs to
      operationId: listGroups
      tags: [groups]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Group" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a group
      operationId: createGroup
      tags: [groups]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGroupRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/groups/{id}:
    patch:
      summary: Update a group (rename or change default currency)
      operationId: updateGroup
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateGroupRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: Delete a group (creator only; cascades)
      operationId: deleteGroup
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/export.csv:
    get:
      summary: Export the group's expenses and settlements as a CSV
      description: |
        Streams a CSV file with every non-deleted expense and settlement
        in the group, in chronological order, followed by a final
        `Total balance` row that mirrors `/v1/groups/{id}/balances`.

        The format is a superset of Splitwise's CSV export:

        ```
        Date,Time,Description,Category,Cost,Currency,Payer,Notes,Created,CreatedBy,<member1>,<member2>,...
        ```

        The first 5 columns and the trailing per-member columns match
        Splitwise's format (so the file can be re-imported through
        `/v1/imports/splitwise`). The middle columns carry the extra
        data dothesplit stores so a re-import via
        `/v1/imports/dothesplit` can rebuild the group faithfully:
        `Time` keeps the second-precision incurred-at timestamp,
        `Payer` makes the payer explicit (avoiding sign-based
        inference), `Notes` round-trips the expense's free-form notes,
        and `Created`/`CreatedBy` carry provenance. Settlements appear
        as `Payment` rows.

        Per-row member columns hold each member's signed `paid - share`
        in the group's default currency, formatted with two fraction
        digits. Members are listed in `joined_at` order. Soft-deleted
        users render with their stored display name (a stable
        non-identifying tombstone), so the column header is stable.
      operationId: exportGroupCSV
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/members:
    post:
      summary: Add a member to a group (invitee must be registered)
      operationId: addGroupMember
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddMemberRequest" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupMember" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/members/{userId}:
    delete:
      summary: Remove a member (creator removes anyone; members may leave themselves)
      description: |
        The group creator can remove any non-creator member. Any member may
        remove themselves (leave). The creator cannot leave or be removed -
        ownership transfer or full group deletion is required first.
        The target's net balance for the group must be exactly zero (settle up
        first), so removing them never silently writes off debt. If the group
        ends up with fewer than 2 members, any pinned `default_split` is
        cleared automatically.
      operationId: removeGroupMember
      tags: [groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Member removed
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/groups/{id}/expenses:
    get:
      summary: List group expenses (newest first)
      operationId: listExpenses
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Expense" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create an expense
      operationId: createExpense
      tags: [expenses]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExpenseRequest" }
      responses:
        "201":
          description: Created
          content:
