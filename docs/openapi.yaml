  /v1/groups/{id}/events:
    get:
      summary: Subscribe to the group's real-time activity stream (SSE)
      description: |
        A long-lived Server-Sent Events stream. The server emits one
        `event: activity` frame whenever an expense or settlement in this group
        is created, updated, deleted, or restored (by any member or the
        recurring worker), plus periodic `: ping` comment heartbeats.

        Each frame's `data` is a minimal JSON signal (ids + action + actor +
        timestamp), NOT the full entity: clients react by re-fetching the
        affected views, so they always render exactly what a manual refresh
        would. No amounts or notes ride this channel.

        The token cannot be sent via `EventSource` (which can't set the
        Authorization header), so the SPA consumes this stream through `fetch`
        + a `ReadableStream` reader, carrying the bearer token in the header
        like every other request.
      operationId: streamGroupEvents
      tags: [activity]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/search:
    get:
      summary: Search expenses and settlements across the caller's groups
      description: |
        Case-insensitive substring match over the expense `description`/`notes`
        fields and the settlement `note` field. Results are limited to groups
        the caller is a member of, exclude soft-deleted rows, and are returned
        newest-first across all groups (by `occurred_at`, then `created_at`).
        The optional repeated `group_id` parameter narrows the search to those
        groups; group ids the caller is not a member of are silently ignored.
        The optional `category_id` parameter narrows results to a single
        category and implies "expenses only" - settlements are excluded when
        it is set, since they have no category. Unknown ids yield zero matches.
      operationId: search
      tags: [search]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 200 }
          description: Substring to match. Whitespace is trimmed.
        - in: query
          name: group_id
          required: false
          schema:
            type: array
            items: { type: string, format: uuid }
          style: form
          explode: true
          description: Repeat to filter to one or more groups. Omit to search all groups the caller belongs to.
        - in: query
          name: category_id
          required: false
          schema: { type: string, format: uuid }
          description: |
            Narrow results to a single category. When set, settlements are
            excluded from the response. Unknown id silently yields zero matches.
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
          description: Max items returned. Defaults to 100.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/imports/splitwise:
    post:
      summary: Import a group from a Splitwise CSV export (2..32 members)
      description: |
        Parses a Splitwise CSV export and either previews the result
        (`dry_run: true`) or commits it (`dry_run: false`) by creating a new
        group, resolving member emails, and creating one or more expenses per
        valid row.

        Splitwise convention: each row's per-user column is the user's signed
        net balance change for the row (`share - paid`). Negative users are
        creditors (paid more than they owe), positive users are debtors. A
        well-formed row sums to zero (within rounding tolerance) and has at
        least one user on each side. Rows that violate the invariant (all
        zero, same sign, sum too far from zero, blank, or the trailing
        "Total balance" row) are skipped silently and counted in
        `skipped_count`. The strict header
        `Date,Description,Category,Cost,Currency,<name1>,<name2>,...` is
        enforced.

        For rows where multiple users paid (multi-creditor rows), each
        creditor becomes a separate expense; the description gets a `[k/K]`
        suffix so the imported group is still browsable. The total imported
        amount may be less than the row's nominal cost in this case (each
        creditor's self-share is dropped because dothesplit only supports
        one payer per expense). Net balances are preserved exactly.

        Member emails are not validated against the user database to avoid
        leaking which addresses are registered. Unknown emails get a
        non-loginable placeholder account so foreign keys stay valid; the real
        owner can claim the account in a future flow.

        Hard limits: 256 KiB raw CSV; 5000 rows; 32 members; field length
        256 chars. Categories are mapped case-insensitively against the
        seeded label list, falling back to `other`.
      operationId: importSplitwise
      tags: [imports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportSplitwiseRequest" }
      responses:
        "200":
          description: "Preview (when `dry_run: true`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSplitwiseResponse" }
        "201":
          description: "Created (when `dry_run: false`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSplitwiseResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/imports/dothesplit:
    post:
      summary: Import a group from a dothesplit CSV export (2..32 members)
      description: |
        Parses a dothesplit-formatted CSV (the file produced by
        `GET /v1/groups/{id}/export.csv`) and either previews the
        result (`dry_run: true`) or commits it (`dry_run: false`).

        Same shape as `/v1/imports/splitwise`: dry-run preview, then
        commit, with the same email-resolution rules. The difference
        is the parser. The dothesplit format keeps the strict
        Splitwise prefix `Date,Description,Category,Cost,Currency` and
        the per-member columns at the end, but adds an optional middle
        block of named columns the exporter populates: `Time` (full
        second-precision incurred-at), `Payer` (explicit payer name to
        bypass sign-based inference), `Notes` (free-form per-expense
        notes), `Created` and `CreatedBy` (provenance, informational).

        On commit the importer prefers the explicit `Payer` column
        when present, combines `Date` + `Time` into the new
        `incurred_at`, and round-trips `Notes` into `expense.notes`.
        `Created` / `CreatedBy` are surfaced in the preview but not
        stored: the new group has fresh audit columns, with the
        importing user as `created_by`.

        Limits and error handling match `/v1/imports/splitwise`.
      operationId: importDoTheSplit
      tags: [imports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportSplitwiseRequest" }
      responses:
        "200":
          description: "Preview (when `dry_run: true`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSplitwiseResponse" }
        "201":
          description: "Created (when `dry_run: false`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSplitwiseResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/groups/{id}/imports/expenses:
    post:
      summary: Import CSV expenses into an existing group
      description: |
        Appends expenses from a DoTheSplit-shaped CSV into an existing
        group. Unlike `/v1/imports/dothesplit`, no group is created and
        no member resolution happens: the actor must already be a
        member, and every imported expense lives under the current
        member roster.

        Header rules match the dothesplit exporter: the mandatory
        prefix `Date,Description,Category,Cost,Currency`, an optional
        run of named columns (`Time, Payer, Notes, Created,
        CreatedBy`) in any order, and any trailing per-member columns
        which are accepted but ignored. The minimum a row needs to be
        kept is `Date`, `Description`, and `Cost`; everything else is
        optional. Empty cells fall back to the group's defaults.

        Splits are derived from the group, not the CSV: a 2-member
        group with a pinned `default_split` uses those basis points;
        every other configuration falls back to an equal split across
        all current members.

        Payer resolution: the optional `Payer` cell is matched
        case-insensitively against the current member display names. An
        empty cell uses the importing user as the payer. An unknown
        name causes the row to be skipped and reported in
        `skipped`.

        Errors and limits match `/v1/imports/dothesplit` (256 KiB raw
        CSV, 5000 rows, 256-char fields). Categories are mapped against
        the seeded label list with `other` as the fallback.
      operationId: importGroupExpensesCSV
      tags: [imports]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportGroupExpensesRequest" }
      responses:
        "200":
          description: "Preview (when `dry_run: true`)"
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ImportGroupExpensesResponse" }
        "201":
          description: "Created (when `dry_run: false`)"
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ImportGroupExpensesResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

