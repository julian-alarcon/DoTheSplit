  /v1/admin/users/{id}/password:
    post:
      summary: Send the user a password-reset email (admin, step-up)
      description: |
        Scrambles the target user's password hash, revokes every refresh token
        for them, and emails them a 6-digit code so they can set a new password
        through the standard /reset flow. The admin never types a temporary
        password.
      operationId: adminResetUserPassword
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Password reset email queued; target's refresh tokens revoked.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/users/{id}/role:
    patch:
      summary: Promote or demote a user (admin, step-up)
      operationId: adminSetUserRole
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetUserRoleRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/groups:
    get:
      summary: List all groups across the instance (admin)
      operationId: adminListGroups
      tags: [admin]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminGroupListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/groups/{id}:
    delete:
      summary: Soft-delete any group (admin, step-up)
      operationId: adminDeleteGroup
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpRequest" }
      responses:
        "204":
          description: Deleted
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "423":
          description: Step-up rate-limited.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/smtp:
    get:
      summary: Get SMTP configuration (admin)
      operationId: adminGetSmtpConfig
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update SMTP configuration (admin)
      operationId: adminUpdateSmtpConfig
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SmtpConfigUpdateRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/smtp/password:
    get:
      summary: Reveal the stored SMTP password (admin)
      description: |
        Decrypts and returns the SMTP password as cleartext. Admin-only and
        audit-logged as `admin_view_smtp_password`. The cleartext is never
        returned by `GET /v1/admin/smtp` - admins must use this dedicated
        endpoint, which makes the action explicit and reviewable.
      operationId: adminRevealSmtpPassword
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpPasswordResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: SMTP is not configured, or no password is stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/smtp/test:
    post:
      summary: Test the current SMTP configuration (admin)
      operationId: adminTestSmtpConfig
      tags: [admin]
      responses:
        "200":
          description: Result of the connection test.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpTestResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/smtp/send-test:
    post:
      summary: Send a real test email to the admin's own address (admin)
      description: |
        Sends a plain-text test email through the configured SMTP server to
        the calling admin's verified email address. Synchronous: the SMTP
        result is reflected directly in the response (no outbox round-trip),
        so failures surface immediately in the admin UI.
      operationId: adminSendSmtpTestEmail
      tags: [admin]
      responses:
        "200":
          description: Result of the send attempt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpTestResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/audit:
    get:
      summary: List admin audit entries (admin)
      operationId: adminListAuditLog
      tags: [admin]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: action
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAuditListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived JWT access token for SPA / native clients, obtained from
        `/v1/auth/token` and refreshed via `/v1/auth/refresh`. Sent as
        `Authorization: Bearer <token>` on every authenticated endpoint.

  parameters:
    GroupId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExpenseId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    RecurringId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SettlementId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Invalid input (malformed JSON, failed validation, or unknown field).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid bearer access token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted for this resource.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource does not exist (or is hidden by soft-delete).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Request conflicts with existing state (e.g. duplicate email).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limited. Retry after the `Retry-After` header.
      headers:
        Retry-After:
          description: Seconds until the client may retry.
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServiceUnavailable:
      description: Server is not ready (e.g. DB unreachable).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    SetupRequired:
      description: Instance is in first-run setup mode; visit /setup.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    User:
      type: object
      required: [id, email, display_name, created_at, has_avatar, week_start]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        created_at: { type: string, format: date-time }
        has_avatar:
          type: boolean
          description: True when the user has uploaded a pixel avatar. Fetch it at `/v1/users/{id}/avatar`.
        avatar_updated_at:
          type: string
          format: date-time
          description: Cache-buster for the avatar URL. Changes on every upload/delete.
        deleted_at:
          type: string
          format: date-time
          description: Set when the account has been soft-deleted; `display_name` is then a tombstone.
        week_start:
          type: integer
          enum: [0, 1]
          description: First day of the week in calendar UIs. 0 = Sunday, 1 = Monday.
        is_admin:
          type: boolean
          readOnly: true
          description: True when the user has the admin role. Read-only; promotion only happens via the bootstrap path or an admin endpoint.
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          description: When the email address was confirmed. Null until the user verifies, or set automatically at registration when SMTP is unconfigured.

    UpdateMeRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string, minLength: 1, maxLength: 80 }
        week_start:
          type: integer
          enum: [0, 1]
          description: First day of the week. 0 = Sunday, 1 = Monday.

    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [old_password, new_password]
      properties:
        old_password: { type: string, minLength: 1, maxLength: 256 }
        new_password: { type: string, minLength: 10, maxLength: 256 }

    SetAvatarRequest:
      type: object
      additionalProperties: false
      required: [png_base64]
      properties:
        png_base64:
          type: string
          minLength: 1
          maxLength: 1500
          description: Base64-encoded PNG. Decoded size must be <= 1024 bytes and the image exactly 8x8 pixels.

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 10, maxLength: 256 }
        display_name: { type: string, minLength: 1, maxLength: 80 }
      example:
        email: alice@example.com
        password: correct-horse-battery-staple
        display_name: Alice

    RegisterResponse:
      type: object
      required: [user, verification_required]
      properties:
        user: { $ref: "#/components/schemas/User" }
        verification_required:
          type: boolean
          description: True when the user must POST a 6-digit code to `/v1/auth/verify` before logging in. False when SMTP is unconfigured and the account was auto-verified.

    VerifyEmailRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit numeric code received by email.
      example:
        email: alice@example.com
        code: "482193"

    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 254 }
      example:
        email: alice@example.com

    PasswordResetConfirm:
      type: object
      additionalProperties: false
      required: [email, code, new_password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit numeric code received by email.
        new_password: { type: string, minLength: 10, maxLength: 256 }
      example:
        email: alice@example.com
        code: "482193"
        new_password: correct-horse-battery-staple

    ResendVerificationRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 254 }
      example:
        email: alice@example.com

    ChangeEmailRequest:
      type: object
      additionalProperties: false
      required: [new_email, password]
      properties:
        new_email: { type: string, format: email, maxLength: 254 }
        password:
          type: string
          minLength: 1
          description: The caller's current password (step-up).
      example:
        new_email: alice.new@example.com
        password: correct-horse-battery-staple

    ConfirmEmailChangeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 6-digit code received at the new address.
      example:
        code: "917544"

    NotificationPrefs:
      type: object
      additionalProperties: false
      description: |
        Per-user, per-event email opt-in flags. All default to false (off).
        The server only emails when the corresponding flag is true AND SMTP is
        configured.
      properties:
        notify_recurring_run:
          type: boolean
          description: Email me when a recurring expense is materialized in one of my groups.
        notify_settlement:
          type: boolean
          description: Email me when a settlement is recorded in one of my groups.
        notify_group_added:
          type: boolean
          description: Email me when I am added to a new group.

    SetupStatus:
      type: object
      additionalProperties: false
      required: [locked]
      properties:
        locked:
          type: boolean
          description: True after the install ceremony has been completed; false while it is still pending.

    SetupCompleteRequest:
      type: object
      additionalProperties: false
      required: [token, email, password, display_name]
      properties:
        token: { type: string, minLength: 1, maxLength: 256 }
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 10, maxLength: 256 }
        display_name: { type: string, minLength: 1, maxLength: 80 }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: "Short-lived JWT. Send as `Authorization: Bearer <access_token>`."
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
        refresh_token:
          type: string
          description: |
            Rotating refresh token. Only present for native clients (no cookie
            jar); web clients receive it as the `dts_refresh` httpOnly cookie
            and this field is omitted.

    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          description: |
            Refresh token for native clients. Web clients omit this and rely on
            the `dts_refresh` httpOnly cookie instead.

    Group:
      type: object
      required:
        [
          id,
          name,
          default_currency,
          created_by,
          created_at,
          members,
          unread_count,
        ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO-4217 code used when expenses omit currency
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        unread_count:
          type: integer
          minimum: 0
          description: |
            Number of activity-feed events in this group the caller has not yet
            seen, excluding the caller's own actions. Computed against the
            member's last-read marker; drops to 0 after opening the activity log
            (POST /v1/groups/{id}/activity/read).
        members:
          type: array
          items: { $ref: "#/components/schemas/GroupMember" }
        default_split:
          type: array
          minItems: 2
          maxItems: 2
          description: |
            Optional 2-member percentage split that prefills the create-expense form.
            Automatically cleared by the server when the group grows past 2 members.
          items: { $ref: "#/components/schemas/DefaultSplitEntry" }

    DefaultSplitEntry:
      type: object
      required: [user_id, basis_points]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        basis_points:
          type: integer
          minimum: 0
          maximum: 10000
          description: 0..10000; the two entries must sum to exactly 10000.

    GroupMember:
      type: object
      required: [user_id, display_name, joined_at, has_avatar]
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        joined_at: { type: string, format: date-time }
        has_avatar: { type: boolean }
        avatar_updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          description: Set when the user has soft-deleted their account; `display_name` is a tombstone.

    CreateGroupRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
          default: "EUR"
      example:
        name: Trip to Lisbon
        default_currency: EUR

    UpdateGroupRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
        default_split:
          type: array
          maxItems: 2
          nullable: true
          description: |
            Set the default 2-member split. Pass an empty array (or null) to clear it.
            Only valid when the group has exactly 2 members.
          items: { $ref: "#/components/schemas/DefaultSplitEntry" }
        created_by:
          type: string
          format: uuid
          description: |
            Transfer group ownership to another member. Only the current owner
            may set this; the target must already be a member of the group.

    AddMemberRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email }

    SplitMode:
      type: string
      enum: [equal, exact, percent, shares]

    SplitInput:
      type: object
      additionalProperties: false
      required: [user_id]
      properties:
        user_id: { type: string, format: uuid }
        # For mode=exact: value is the absolute amount in cents.
        # For mode=percent: value is 0..10000 (basis points, 10000 = 100%).
        # For mode=shares: value is an integer share weight.
        # For mode=equal: value is ignored (server splits evenly).
        value: { type: integer, format: int64, minimum: 0 }

    Split:
      type: object
      required: [user_id, share_cents]
      properties:
        user_id: { type: string, format: uuid }
        share_cents: { type: integer, format: int64, minimum: 0 }

    CreateExpenseRequest:
      type: object
      additionalProperties: false
      required: [description, amount_cents, payer_id, mode, splits]
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        currency:
          {
            type: string,
            minLength: 3,
            maxLength: 3,
            description: "Defaults to group.default_currency if omitted",
          }
        payer_id: { type: string, format: uuid }
        incurred_at: { type: string, format: date-time }
        category_id:
          type: string
          format: uuid
          description: "Defaults to the `other` category when omitted."
        notes:
          {
            type: string,
            maxLength: 2000,
            description: "Optional free-form notes about the expense.",
          }
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
      example:
        description: Hotel
        amount_cents: 20000
        payer_id: 7a1d5b9e-0c0a-4a12-9a55-0c55cf2b6fb1
        mode: equal
        splits:
          - user_id: 7a1d5b9e-0c0a-4a12-9a55-0c55cf2b6fb1
          - user_id: 9c0e3a31-6b2f-41d7-bf80-7a3f1b6d3d24

    UpdateExpenseRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        category_id: { type: string, format: uuid }
        notes:
          {
            type: string,
            maxLength: 2000,
            description: "Optional free-form notes about the expense.",
          }
        payer_id:
          type: string
          format: uuid
          description: New payer; must be a current group member.
        mode:
          allOf:
            - $ref: "#/components/schemas/SplitMode"
          description: |
            Must be supplied together with `splits`. When both are present, the server
            re-resolves per-user shares. When neither is present, existing splits are
            rescaled proportionally if `amount_cents` changes.
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
          description: Must be supplied together with `mode`.
        incurred_at:
          type: string
          format: date-time
          description: |
            When the expense was incurred (independent of when it was recorded).
            Defaults to the creation time if omitted on create, then immutable
            unless explicitly set here.

    Expense:
      type: object
      required:
        [
          id,
          group_id,
          description,
          amount_cents,
          currency,
          payer_id,
          created_by,
          incurred_at,
          created_at,
          splits,
          category_id,
          notes,
        ]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        description: { type: string }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string }
        payer_id: { type: string, format: uuid }
        created_by:
          type: string
          format: uuid
          description: |
            User who recorded the expense. Distinct from `payer_id` (who fronted
            the money) - any group member may create an expense on behalf of any
            other member, and the history attributes the action to this user.
        incurred_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        category_id: { type: string, format: uuid }
        notes: { type: string }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: When the expense was soft-deleted; null/absent when active.
        splits:
          type: array
          items: { $ref: "#/components/schemas/Split" }

    Category:
      type: object
      required: [id, slug, label, group_label]
      properties:
        id: { type: string, format: uuid }
        slug:
          {
            type: string,
            description: "Stable machine identifier (e.g. `groceries`). The frontend maps this to an icon.",
          }
        label: { type: string, description: "Human-readable name." }
        group_label:
          {
            type: string,
            description: "Section header for the picker (e.g. `Entertainment`, `No category`).",
          }

    ImportSplitwiseRequest:
      type: object
      additionalProperties: false
      required: [csv, group_name, default_currency, members]
      properties:
        csv:
          type: string
          maxLength: 262144
          description: Raw CSV text exactly as exported by Splitwise. Hard cap 256 KiB.
        group_name: { type: string, minLength: 1, maxLength: 80 }
        default_currency: { type: string, minLength: 3, maxLength: 3 }
        members:
          type: array
          minItems: 2
          maxItems: 32
          description: One entry per CSV user column, in column order. Must match the header exactly.
          items: { $ref: "#/components/schemas/ImportSplitwiseMember" }
        dry_run:
          type: boolean
          default: false
          description: When true, parses the CSV and returns the preview without writing anything.
      example:
        csv: "Date,Description,Category,Cost,Currency,Alice,Bob\n2024-01-01,Coffee,Dining out,4.00,EUR,2.00,-2.00\n"
        group_name: Prost
        default_currency: EUR
        members:
          - csv_name: Alice
            email: alice@example.com
          - csv_name: Bob
            email: bob@example.com
        dry_run: true

    ImportSplitwiseMember:
      type: object
      additionalProperties: false
      required: [csv_name, email]
      properties:
        csv_name:
          {
            type: string,
            minLength: 1,
            maxLength: 80,
            description: Name as it appears in the CSV column header.,
          }
        email: { type: string, format: email }

    ImportSplitwiseResponse:
      type: object
      required:
        [
          group_name,
          default_currency,
          members,
          expense_count,
          settlement_count,
          skipped_count,
          skipped,
          balances,
          preview,
          settlement_preview,
          csv_currencies,
        ]
      properties:
        group_id:
          type: string
          format: uuid
          description: "Set only when the import was committed (`dry_run: false`)."
        group_name: { type: string }
        default_currency: { type: string, minLength: 3, maxLength: 3 }
        members:
          type: array
          minItems: 2
          maxItems: 32
          items: { $ref: "#/components/schemas/ImportSplitwiseMember" }
        expense_count:
          type: integer
          description: Number of valid expenses parsed from the CSV.
        settlement_count:
          type: integer
          description: Number of valid settlements parsed from the CSV (rows whose Splitwise category is "Payment").
        skipped_count:
          type: integer
          description: Number of rows skipped (malformed, structurally invalid, or the trailing "Total balance" row).
        skipped:
          type: array
          maxItems: 50
          description: Raw CSV records (rejoined with commas) for rows that were skipped, capped at 50 entries. Useful for surfacing why an import didn't include certain rows.
          items: { type: string }
        balances:
          type: array
          minItems: 2
          maxItems: 32
          description: Projected net balance per member after the import, derived from the expenses AND settlements that will actually be created (sign convention matches /v1/groups/{id}/balances).
          items: { $ref: "#/components/schemas/ImportSplitwiseBalance" }
        preview:
          type: array
          maxItems: 6
          items: { $ref: "#/components/schemas/ImportSplitwisePreviewRow" }
        settlement_preview:
          type: array
          maxItems: 6
          items:
            { $ref: "#/components/schemas/ImportSplitwiseSettlementPreview" }
        csv_currencies:
          type: array
          description: |
            Distinct ISO currency codes seen in the CSV, in first-seen order.
            DoTheSplit groups are single-currency, so a length > 1 means the
            CSV mixes currencies and the imported values will be stored under
            the chosen `default_currency` regardless of their original code.
            UI clients should warn the user in that case.
          items: { type: string, minLength: 3, maxLength: 3 }

    ImportSplitwiseBalance:
      type: object
      required: [csv_name, net_cents]
      properties:
        csv_name:
          {
            type: string,
            description: Member name as it appears in the CSV header.,
          }
        net_cents:
          type: integer
          format: int64
          description: Net cents; positive = member is owed, negative = member owes.

    ImportSplitwisePreviewRow:
      type: object
      required:
        [
          description,
          incurred_at,
          amount_cents,
          currency,
          category_slug,
          payer_csv_name,
        ]
      properties:
        description: { type: string }
        incurred_at: { type: string, format: date-time }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        category_slug: { type: string }
        payer_csv_name: { type: string }

    ImportSplitwiseSettlementPreview:
      type: object
      required:
        [note, settled_at, amount_cents, currency, from_csv_name, to_csv_name]
      properties:
        note: { type: string }
        settled_at: { type: string, format: date-time }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        from_csv_name:
          { type: string, description: Member who paid (CSV column header). }
        to_csv_name:
          {
            type: string,
            description: Member who received the payment (CSV column header).,
          }

    ImportGroupExpensesRequest:
      type: object
      additionalProperties: false
      required: [csv]
      properties:
        csv:
          type: string
          maxLength: 262144
          description: Raw CSV text. DoTheSplit-shaped header. Hard cap 256 KiB.
        dry_run:
          type: boolean
          default: false
          description: When true, parses the CSV and returns the preview without writing anything.
      example:
        csv: "Date,Description,Category,Cost,Currency,Payer,Notes\n2026-06-01,Pizza,Food,42.00,EUR,Alice,Friday night\n2026-06-03,Taxi,,18.50,,,\n"
        dry_run: true

    ImportGroupExpensesResponse:
      type: object
      required: [expense_count, skipped_count, skipped, preview, csv_currencies]
      properties:
        expense_count:
          type: integer
          description: Number of valid expenses parsed from the CSV.
        skipped_count:
          type: integer
          description: Number of rows skipped (malformed, unknown payer, empty description, etc.).
        skipped:
          type: array
          maxItems: 50
          description: Raw CSV records (rejoined with commas) for skipped rows, capped at 50 entries.
          items: { type: string }
        preview:
          type: array
          maxItems: 6
          items: { $ref: "#/components/schemas/ImportGroupExpensesPreviewRow" }
        csv_currencies:
          type: array
          description: |
            Distinct ISO currency codes seen in the CSV, in first-seen order.
            DoTheSplit groups are single-currency; rows with a different
            currency code (or none at all) are stored under the group's
            `default_currency`. UI clients should warn when length > 1.
          items: { type: string, minLength: 3, maxLength: 3 }

    ImportGroupExpensesPreviewRow:
      type: object
      required:
        [
          description,
          incurred_at,
          amount_cents,
          currency,
          category_slug,
          payer_display_name,
        ]
      properties:
        description: { type: string }
        incurred_at: { type: string, format: date-time }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        category_slug: { type: string }
        payer_display_name:
          {
            type: string,
            description: Display name of the resolved member who paid this row.,
          }

    ExpenseRevision:
      type: object
      required:
        [id, expense_id, edited_by, edited_at, field, old_value, new_value]
      properties:
        id: { type: string, format: uuid }
        expense_id: { type: string, format: uuid }
        edited_by: { type: string, format: uuid }
        edited_at: { type: string, format: date-time }
        field:
          type: string
          enum:
            [
              description,
              amount_cents,
              category_id,
              payer_id,
              splits,
              incurred_at,
              notes,
            ]
          description: Which field was changed.
        old_value: { type: string, description: "Previous value, stringified." }
        new_value: { type: string, description: "New value, stringified." }

    Balance:
      type: object
      required: [user_id, display_name, net_cents]
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        net_cents:
          {
            type: integer,
            format: int64,
            description: "positive = owed to user; negative = user owes",
          }

    SimplifiedDebt:
      type: object
      required: [from_user_id, to_user_id, amount_cents]
      properties:
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64, minimum: 1 }

    BalancesResponse:
      type: object
      required: [net, simplified]
      properties:
        net:
          type: array
          items: { $ref: "#/components/schemas/Balance" }
        simplified:
          type: array
          items: { $ref: "#/components/schemas/SimplifiedDebt" }

    CreateSettlementRequest:
      type: object
      additionalProperties: false
      required: [to_user_id, amount_cents]
      properties:
        from_user_id:
          type: string
          format: uuid
          description: |
            Member who is paying. Optional, defaults to the authenticated user
            when omitted. Must be a current group member, and must differ from
            `to_user_id`.
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        note: { type: string, maxLength: 200 }
        settled_at: { type: string, format: date-time }

    UpdateSettlementRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        note: { type: string, maxLength: 200 }
        settled_at: { type: string, format: date-time }

    Settlement:
      type: object
      required:
        [
          id,
          group_id,
          from_user_id,
          to_user_id,
          amount_cents,
          settled_at,
          created_at,
        ]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        amount_cents: { type: integer, format: int64 }
        note: { type: string }
        settled_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: When the settlement was soft-deleted; null/absent when active.

    TransactionItem:
      type: object
      required: [kind, occurred_at]
      properties:
        kind:
          type: string
          enum: [expense, settlement]
        occurred_at: { type: string, format: date-time }
        cadence:
          allOf: [{ $ref: "#/components/schemas/Cadence" }]
          description: "When kind=expense and the expense matches a recurring template by content, the template's cadence. Omitted otherwise."
        expense:
          allOf: [{ $ref: "#/components/schemas/Expense" }]
          description: "Present iff kind=expense."
        settlement:
          allOf: [{ $ref: "#/components/schemas/Settlement" }]
          description: "Present iff kind=settlement."

    TransactionPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TransactionItem" }
        next_cursor:
          type: string
          description: "Pass to the next request as `cursor`. Absent when there are no more items."

    ActivityActor:
      type: object
      required: [user_id, display_name, has_avatar]
      description: The member who performed the action. Omitted for system/recurring rows.
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        has_avatar: { type: boolean }
        avatar_updated_at: { type: string, format: date-time }

    ActivityItem:
      type: object
      required:
        [
          id,
          action,
          occurred_at,
          target_id,
          target_kind,
          description,
          amount_cents,
          currency,
          recurring,
        ]
      properties:
        id:
          type: string
          format: uuid
          description: Activity event id; also the cursor tiebreaker.
        action:
          type: string
          enum:
            - expense.created
            - expense.updated
            - expense.deleted
            - expense.restored
            - settlement.created
            - settlement.updated
            - settlement.deleted
            - settlement.restored
        occurred_at:
          type: string
          format: date-time
          description: When the action happened (the event timestamp, not the expense/settlement date).
        actor:
          allOf: [{ $ref: "#/components/schemas/ActivityActor" }]
          description: The member who performed the action. Omitted for system/recurring rows.
        target_id: { type: string, format: uuid }
        target_kind:
          type: string
          enum: [expense, settlement]
        description:
          type: string
          description: Expense description, or settlement note (may be empty). Survives soft-delete.
        from_user_id:
          type: string
          format: uuid
          description: 'Settlements only: the member who paid. Lets the client render "X paid Y".'
        to_user_id:
          type: string
          format: uuid
          description: "Settlements only: the member who was paid."
        amount_cents: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        category_slug:
          type: string
          description: "Category slug at the time of the action (the new slug on a category change). Expenses only."
        category_group_label:
          type: string
          description: "Category group label, used for the icon fallback. Expenses only."
        recurring:
          type: boolean
          description: 'True when the expense was generated from a recurring template; the client prefixes "New recurring expense:".'

    ActivityPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }
        next_cursor:
          type: string
          description: "Pass to the next request as `cursor`. Absent when there are no more items."

    SearchGroupRef:
      type: object
      required: [id, name, default_currency, members]
      description: |
        Group descriptor returned alongside search results so the client can
        render the "GroupA" section heading, payer/recipient avatars, and the
        per-group filter without a follow-up `/v1/groups` round-trip.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        default_currency: { type: string, minLength: 3, maxLength: 3 }
        members:
          type: array
          items: { $ref: "#/components/schemas/GroupMember" }

    SearchResponse:
      type: object
      required: [query, items, groups, available_category_ids]
      description: |
        Flat list of matching expenses and settlements, newest first across
        all groups. The client groups them by `group_id` for display. The
        `groups` field is the set of groups the caller is a member of (or the
        subset they filtered to) and is what the per-group filter chip row
        is built from - it is *not* limited to groups that produced a hit.
        `available_category_ids` lists every distinct category present among
        the expenses that match `q` + `group_id` (independent of the active
        `category_id` filter), so the client can hide categories that have
        no hits in the current search from the category picker.
      properties:
        query: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/TransactionItem" }
        groups:
          type: array
          items: { $ref: "#/components/schemas/SearchGroupRef" }
        available_category_ids:
          type: array
          items: { type: string, format: uuid }
          description: |
            Distinct expense categories matching `q` + `group_id`, ignoring
            the active `category_id` filter. Empty when no expenses match.

    Cadence:
      type: string
      enum: [daily, weekly, biweekly, monthly, yearly]

    CreateRecurringExpenseRequest:
      type: object
      additionalProperties: false
      required:
        [
          description,
          amount_cents,
          payer_id,
          mode,
          splits,
          cadence,
          next_run_at,
        ]
      properties:
        description: { type: string, minLength: 1, maxLength: 200 }
        amount_cents: { type: integer, format: int64, minimum: 1 }
        currency:
          {
            type: string,
            minLength: 3,
            maxLength: 3,
            description: "Defaults to group.default_currency if omitted",
          }
        payer_id: { type: string, format: uuid }
        category_id:
          {
            type: string,
            format: uuid,
            description: "Defaults to the `other` category when omitted.",
          }
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SplitInput" }
        cadence: { $ref: "#/components/schemas/Cadence" }
        next_run_at: { type: string, format: date-time }

    RecurringExpense:
      type: object
      required:
        [
          id,
          group_id,
          description,
          amount_cents,
          currency,
          payer_id,
          category_id,
          mode,
          splits,
          cadence,
          next_run_at,
          created_at,
        ]
      properties:
        id: { type: string, format: uuid }
        group_id: { type: string, format: uuid }
        description: { type: string }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string }
        payer_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        mode: { $ref: "#/components/schemas/SplitMode" }
        splits:
          type: array
          items: { $ref: "#/components/schemas/SplitInput" }
        cadence: { $ref: "#/components/schemas/Cadence" }
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    StepUpRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
          description: The admin's own password, re-entered for the destructive action.

    AdminUser:
      type: object
      required:
        [id, email, display_name, role, created_at, has_avatar, week_start]
      properties:
        id: { type: string, format: uuid }
        email:
          type: string
          format: email
          nullable: true
          description: Decrypted email. Null for soft-deleted users (their encrypted email is scrambled at delete time).
        display_name: { type: string }
        role:
          type: string
          enum: [user, admin]
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          description: Set when the account is soft-deleted.
        has_avatar: { type: boolean }
        week_start: { type: integer, enum: [0, 1] }

    AdminUserListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminUser" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    AdminUserCreateRequest:
      type: object
      additionalProperties: false
      required: [email, display_name]
      properties:
        email: { type: string, format: email }
        display_name: { type: string, minLength: 1, maxLength: 80 }
        role:
          type: string
          enum: [user, admin]
          default: user
      example:
        email: "alice@example.org"
        display_name: "Alice"
        role: "user"

    AdminSetUserRoleRequest:
      type: object
      additionalProperties: false
      required: [role, password]
      properties:
        role:
          type: string
          enum: [user, admin]
        password:
          type: string
          minLength: 1
          description: The admin's own password (step-up).

    AdminGroup:
      type: object
      required:
        [
          id,
          name,
          default_currency,
          created_by,
          created_at,
          member_count,
          expense_count,
        ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        default_currency: { type: string, minLength: 3, maxLength: 3 }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        member_count: { type: integer, minimum: 0 }
        expense_count: { type: integer, minimum: 0 }

    AdminGroupListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminGroup" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    SmtpTlsMode:
      type: string
      enum: [none, starttls, tls]

    SmtpConfig:
      type: object
      required: [host, port, from_address, tls_mode, password_set]
      properties:
        host: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username:
          type: string
          nullable: true
        from_address: { type: string, format: email }
        tls_mode: { $ref: "#/components/schemas/SmtpTlsMode" }
        password_set:
          type: boolean
          description: True when an encrypted password is stored. The cleartext is never returned.
        updated_at: { type: string, format: date-time }
        updated_by:
          type: string
          format: uuid
          nullable: true

    SmtpConfigUpdateRequest:
      type: object
      additionalProperties: false
      required: [host, port, from_address, tls_mode]
      properties:
        host: { type: string, minLength: 1 }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username:
          type: string
          nullable: true
        from_address: { type: string, format: email }
        tls_mode: { $ref: "#/components/schemas/SmtpTlsMode" }
        smtp_password:
          type: string
          nullable: true
          description: SMTP password. Pass null to leave the existing one untouched; pass empty string to clear it; pass a non-empty value to set a new one.
        allow_plaintext_credentials:
          type: boolean
          default: false
          description: Required when tls_mode='none' and a username/password is provided.

    SmtpPasswordResponse:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: Cleartext SMTP password. Empty string when no password is stored.

    SmtpTestResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        error:
          type: string
          description: Short, non-sensitive error code on failure (e.g. "dial_timeout", "auth_failed", "tls_handshake_failed").

    AdminAuditEntry:
      type: object
      required: [id, actor_user_id, action, success, created_at]
      properties:
        id: { type: string, format: uuid }
        actor_user_id: { type: string, format: uuid }
        target_user_id:
          type: string
          format: uuid
          nullable: true
        target_group_id:
          type: string
          format: uuid
          nullable: true
        action: { type: string }
        ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        success: { type: boolean }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at: { type: string, format: date-time }

    AdminAuditListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminAuditEntry" }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }
